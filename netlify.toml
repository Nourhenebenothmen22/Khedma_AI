# ─────────────────────────────────────────────────────
# Netlify Configuration — Khedma AI Frontend
# ─────────────────────────────────────────────────────
[build]
  base      = "frontend"
  command   = "npm ci && npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# ─── SPA Fallback Routing ────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─── Security Headers ────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-XSS-Protection          = "1; mode=block"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://flagcdn.com; connect-src 'self' *; frame-ancestors 'none';"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=(), interest-cohort=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Deploy Contexts ─────────────────────────────────
# Production — main branch
[context.production.environment]
  VITE_ENV = "production"

# Deploy Previews — pull requests
[context.deploy-preview.environment]
  VITE_ENV = "preview"

# Branch deploys — develop / feature branches
[context.branch-deploy.environment]
  VITE_ENV = "preview"
