name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────
  # FRONTEND: Lint → Type-check → Build
  # ─────────────────────────────────────────────────────
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter (oxlint)
        run: npm run lint

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'https://khedma-ai-api.onrender.com' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ─────────────────────────────────────────────────────
  # BACKEND: Type-check → Test → Build
  # ─────────────────────────────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: ${{ secrets.CI_DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/khedma_test' }}
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

      - name: Build production bundle
        run: npm run build

  # ─────────────────────────────────────────────────────
  # GATE: Both jobs must pass before deploy
  # ─────────────────────────────────────────────────────
  all-checks-pass:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - run: echo "✅ All CI checks passed — safe to deploy."
